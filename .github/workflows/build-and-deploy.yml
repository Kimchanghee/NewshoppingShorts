name: Build and Deploy

on:
  push:
    tags:
      - 'v*'  # v1.0.2, v1.1.0 등 버전 태그 푸시 시 실행

permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11 (release runtime)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller
        python -c "import sys; import PyInstaller; print('python=', sys.executable); print('pyinstaller=', PyInstaller.__version__)"

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Install Tesseract OCR
      run: choco install tesseract --no-progress -y

    - name: Run Desktop Test Suite
      run: pytest -q

    - name: Run Backend Test Suite
      shell: pwsh
      run: |
        $env:APP_VERSION_UPDATE_API_KEY = "test_update_api_key_for_ci_abcdefghijklmnopqrstuvwxyz123456"
        pytest -q backend/tests

    - name: Download fonts
      run: python scripts/download_all_fonts_final.py

    - name: Download Whisper models
      run: python scripts/download_whisper_models.py
      continue-on-error: true
      timeout-minutes: 10

    - name: Extract version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Import Code Signing Certificate
      shell: pwsh
      run: |
        $thumb = "${{ secrets.SIGN_CERT_THUMBPRINT }}".Trim().ToUpper()
        if ([string]::IsNullOrWhiteSpace($thumb)) {
          throw "SIGN_CERT_THUMBPRINT secret is required for release signing."
        }

        $pfxBase64 = "${{ secrets.SIGN_CERT_PFX_BASE64 }}"
        $pfxPassword = "${{ secrets.SIGN_CERT_PASSWORD }}"
        if (-not [string]::IsNullOrWhiteSpace($pfxBase64)) {
          if ([string]::IsNullOrWhiteSpace($pfxPassword)) {
            throw "SIGN_CERT_PASSWORD secret is required when SIGN_CERT_PFX_BASE64 is provided."
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($pfxBase64))
          $securePwd = ConvertTo-SecureString $pfxPassword -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -Password $securePwd -CertStoreLocation Cert:\\CurrentUser\\My | Out-Null
          Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue
        }

        $installed = Get-ChildItem Cert:\\CurrentUser\\My | Where-Object { $_.Thumbprint -eq $thumb } | Select-Object -First 1
        if (-not $installed) {
          throw "Code signing cert with thumbprint $thumb not found in Cert:\\CurrentUser\\My"
        }

        "SIGN_CERT_THUMBPRINT=$thumb" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Update version.json
      shell: python
      run: |
        import json
        from datetime import date
        from pathlib import Path
        version = "${{ steps.version.outputs.VERSION }}"
        p = Path("version.json")
        data = {}
        if p.exists():
            try:
                data = json.loads(p.read_text(encoding="utf-8"))
            except Exception:
                data = {}
        data["version"] = version
        data.setdefault("min_required_version", "1.0.0")
        data.setdefault("update_channel", "stable")
        data.setdefault("build_date", date.today().isoformat())
        data["updated_at"] = date.today().isoformat()
        p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
        print(f"Updated version.json to {version}")

    - name: Build Installer
      shell: pwsh
      run: |
        ./scripts/build_exe.ps1

    - name: Compute installer SHA256
      id: hash
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $installer = "dist/SSMaker_Setup_v${version}.exe"
        $hash = (Get-FileHash -Path $installer -Algorithm SHA256).Hash.ToLower()
        Write-Host "SHA256: $hash"
        echo "FILE_HASH=$hash" >> $env:GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/SSMaker_Setup_v${{ steps.version.outputs.VERSION }}.exe
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          ## SSMaker v${{ steps.version.outputs.VERSION }}

          ### 이번 업데이트 핵심
          - Linktree 자동 등록 시 상품 링크 제목 앞에 `[000]` 형식 번호가 유지되도록 개선했습니다.
          - YouTube 자동 댓글에 상품 설명과 Linktree 안내 링크가 함께 남도록 업로드 로직을 보강했습니다.
          - Linktree 초기 가입, 쿠팡 파트너스 상품 링크, Google Cloud 실제 캡쳐 OAuth 매뉴얼을 프로그램 안에서 바로 열 수 있게 안내 링크를 정리했습니다.
          - Google Cloud 실제 화면 캡쳐 기반 YouTube OAuth 설정 공지를 새로 연결했습니다.
          - 초보 사용자가 API Key 없이도 쿠팡 파트너스 단축 링크 방식으로 시작할 수 있도록 안내를 명확히 했습니다.

          ### 설치 방법
          1. 설치 파일을 실행하면 기존 설치를 감지합니다.
          2. 일반적으로는 `업데이트(Update)`를 선택하면 됩니다.
          3. 시작 오류를 겪은 경우에는 `재설치(Reinstall)`를 선택하세요.

          ### SHA256
          `${{ steps.hash.outputs.FILE_HASH }}`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update server version API
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/v${version}/SSMaker_Setup_v${version}.exe"

        # Canonicalize JSON so HMAC signature matches backend verification.
        $payload = [ordered]@{
          version = $version
          download_url = $downloadUrl
          release_notes = "Linktree 번호 자동 등록, YouTube 댓글 상품 설명·Linktree 링크 반영, Google Cloud OAuth 실제 캡쳐 매뉴얼 연결"
          is_mandatory = $false
          file_hash = "${{ steps.hash.outputs.FILE_HASH }}"
        }
        $body = $payload | ConvertTo-Json -Compress

        try {
          $headers = @{
            "Content-Type" = "application/json"
            "Authorization" = "Bearer ${{ secrets.APP_VERSION_UPDATE_API_KEY }}"
          }
          $hmacKey = "${{ secrets.APP_VERSION_UPDATE_HMAC_KEY }}"
          if (-not [string]::IsNullOrWhiteSpace($hmacKey)) {
            $hmac = [System.Security.Cryptography.HMACSHA256]::new([System.Text.Encoding]::UTF8.GetBytes($hmacKey))
            $sigBytes = $hmac.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($body))
            $signature = -join ($sigBytes | ForEach-Object { $_.ToString("x2") })
            $headers["X-Update-Signature"] = $signature
          }

          Invoke-RestMethod -Uri "https://ssmaker-auth-api-1049571775048.us-central1.run.app/app/version/update" `
            -Method POST `
            -Headers $headers `
            -Body $body
          Write-Host "Server version updated successfully"
        } catch {
          Write-Host "Warning: Failed to update server version API"
          Write-Host $_.Exception.Message
        }
