name: Build and Deploy

on:
  push:
    tags:
      - 'v*'  # v1.0.2, v1.1.0 등 버전 태그 푸시 시 실행
  workflow_dispatch:

permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11 (release runtime)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller
        python -c "import sys; import PyInstaller; print('python=', sys.executable); print('pyinstaller=', PyInstaller.__version__)"

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Install Tesseract OCR
      shell: pwsh
      run: |
        choco install tesseract --no-progress -y

        $candidates = @()
        $cmd = Get-Command tesseract -ErrorAction SilentlyContinue
        if ($cmd -and $cmd.Source) {
          $candidates += $cmd.Source
        }
        $candidates += @(
          "C:\Program Files\Tesseract-OCR\tesseract.exe",
          "C:\Program Files (x86)\Tesseract-OCR\tesseract.exe",
          (Join-Path $env:LOCALAPPDATA "Programs\Tesseract-OCR\tesseract.exe")
        )
        $candidates += Get-ChildItem -Path "C:\ProgramData\chocolatey" -Recurse -Filter "tesseract.exe" -ErrorAction SilentlyContinue |
          Select-Object -ExpandProperty FullName

        $tesseractExe = $candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
        if (-not $tesseractExe) {
          throw "Tesseract executable was not found after installation."
        }

        $tessRoot = Split-Path $tesseractExe -Parent
        $tessdataCandidates = @(
          (Join-Path $tessRoot "tessdata"),
          "C:\Program Files\Tesseract-OCR\tessdata",
          "C:\Program Files (x86)\Tesseract-OCR\tessdata",
          (Join-Path $env:LOCALAPPDATA "Programs\Tesseract-OCR\tessdata")
        )
        $tessdata = $tessdataCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1

        "TESSERACT_CMD=$tesseractExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "TESSERACT_PATH=$tesseractExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        if ($tessdata) {
          "TESSDATA_PREFIX=$tessdata" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }
        $tessRoot | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

        Write-Host "Tesseract executable: $tesseractExe"
        if ($tessdata) {
          Write-Host "Tessdata directory: $tessdata"
        }
        & $tesseractExe --version

    - name: Download fonts
      run: python scripts/download_all_fonts_final.py

    - name: Run Desktop Test Suite
      run: pytest -q

    - name: Run Backend Test Suite
      shell: pwsh
      run: |
        $env:APP_VERSION_UPDATE_API_KEY = "test_update_api_key_for_ci_abcdefghijklmnopqrstuvwxyz123456"
        pytest -q backend/tests

    - name: Download Whisper models
      run: python scripts/download_whisper_models.py
      continue-on-error: true
      timeout-minutes: 10

    - name: Extract version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Resolve release notes from tag message
      id: notes
      shell: bash
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        SUMMARY="$(git tag -l --format='%(contents:subject)' "v${VERSION}" 2>/dev/null | head -n1)"
        if [ -z "$(printf '%s' "$SUMMARY" | tr -d '[:space:]')" ]; then
          SUMMARY="SSMaker v${VERSION} 업데이트"
        fi
        echo "SUMMARY=${SUMMARY}" >> "$GITHUB_OUTPUT"
        echo "Resolved release notes: ${SUMMARY}"

    - name: Import Code Signing Certificate
      shell: pwsh
      run: |
        $thumb = "${{ secrets.SIGN_CERT_THUMBPRINT }}".Trim().ToUpper()
        if ([string]::IsNullOrWhiteSpace($thumb)) {
          throw "SIGN_CERT_THUMBPRINT secret is required for release signing."
        }

        $pfxBase64 = "${{ secrets.SIGN_CERT_PFX_BASE64 }}"
        $pfxPassword = "${{ secrets.SIGN_CERT_PASSWORD }}"
        if (-not [string]::IsNullOrWhiteSpace($pfxBase64)) {
          if ([string]::IsNullOrWhiteSpace($pfxPassword)) {
            throw "SIGN_CERT_PASSWORD secret is required when SIGN_CERT_PFX_BASE64 is provided."
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($pfxBase64))
          $securePwd = ConvertTo-SecureString $pfxPassword -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -Password $securePwd -CertStoreLocation Cert:\\CurrentUser\\My | Out-Null
          Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue
        }

        $installed = Get-ChildItem Cert:\\CurrentUser\\My | Where-Object { $_.Thumbprint -eq $thumb } | Select-Object -First 1
        if (-not $installed) {
          throw "Code signing cert with thumbprint $thumb not found in Cert:\\CurrentUser\\My"
        }

        "SIGN_CERT_THUMBPRINT=$thumb" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Update version.json
      shell: python
      run: |
        import json
        from datetime import date
        from pathlib import Path
        version = "${{ steps.version.outputs.VERSION }}"
        p = Path("version.json")
        data = {}
        if p.exists():
            try:
                data = json.loads(p.read_text(encoding="utf-8"))
            except Exception:
                data = {}
        data["version"] = version
        data.setdefault("min_required_version", "1.0.0")
        data.setdefault("update_channel", "stable")
        data.setdefault("build_date", date.today().isoformat())
        data["updated_at"] = date.today().isoformat()
        p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
        print(f"Updated version.json to {version}")

    - name: Build Installer
      shell: pwsh
      run: |
        ./scripts/build_exe.ps1

    - name: Compute installer SHA256
      id: hash
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $installer = "dist/SSMaker_Setup_v${version}.exe"
        $hash = (Get-FileHash -Path $installer -Algorithm SHA256).Hash.ToLower()
        Write-Host "SHA256: $hash"
        echo "FILE_HASH=$hash" >> $env:GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/SSMaker_Setup_v${{ steps.version.outputs.VERSION }}.exe
        name: Release v${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        body: |
          ## SSMaker v${{ steps.version.outputs.VERSION }}

          ${{ steps.notes.outputs.SUMMARY }}

          ### 설치 방법
          1. 설치 파일을 실행하면 기존 설치를 감지합니다.
          2. 일반적으로는 `업데이트(Update)`를 선택하면 됩니다.
          3. 시작 오류를 겪은 경우에는 `재설치(Reinstall)`를 선택하세요.

          ### SHA256
          `${{ steps.hash.outputs.FILE_HASH }}`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update server version API
      continue-on-error: true
      shell: python
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
        FILE_HASH: ${{ steps.hash.outputs.FILE_HASH }}
        REPOSITORY: ${{ github.repository }}
        RELEASE_NOTES_SUMMARY: ${{ steps.notes.outputs.SUMMARY }}
        APP_VERSION_API_BASE_URL: ${{ secrets.APP_VERSION_API_BASE_URL }}
        APP_VERSION_UPDATE_API_KEY: ${{ secrets.APP_VERSION_UPDATE_API_KEY }}
        ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        APP_VERSION_UPDATE_HMAC_KEY: ${{ secrets.APP_VERSION_UPDATE_HMAC_KEY }}
      run: |
        import hashlib
        import hmac
        import json
        import os
        import urllib.error
        import urllib.request

        version = os.environ["VERSION"].strip()
        repository = os.environ["REPOSITORY"].strip()
        api_base_url = (os.environ.get("APP_VERSION_API_BASE_URL") or "https://project-user-dashboard-api.vercel.app").rstrip("/")
        download_url = f"https://github.com/{repository}/releases/download/v{version}/SSMaker_Setup_v{version}.exe"

        payload = {
            "version": version,
            "download_url": download_url,
            "release_notes": (os.environ.get("RELEASE_NOTES_SUMMARY") or f"SSMaker v{version} 업데이트").strip(),
            "is_mandatory": False,
            "file_hash": os.environ["FILE_HASH"].strip(),
        }
        body = json.dumps(payload, ensure_ascii=False, separators=(",", ":")).encode("utf-8")

        token_candidates = [
            ("APP_VERSION_UPDATE_API_KEY", os.environ.get("APP_VERSION_UPDATE_API_KEY", "").strip()),
            ("ADMIN_API_KEY", os.environ.get("ADMIN_API_KEY", "").strip()),
        ]
        signing_key = os.environ.get("APP_VERSION_UPDATE_HMAC_KEY", "").strip()
        signature = ""
        if signing_key:
            signature = hmac.new(signing_key.encode("utf-8"), body, hashlib.sha256).hexdigest()

        last_error = None
        for token_name, token in token_candidates:
            if not token:
                continue
            headers = {
                "Content-Type": "application/json",
                "Authorization": f"Bearer {token}",
            }
            if signature:
                headers["X-Update-Signature"] = signature
            request = urllib.request.Request(
                f"{api_base_url}/app/version/update",
                data=body,
                headers=headers,
                method="POST",
            )
            try:
                with urllib.request.urlopen(request, timeout=30) as response:
                    print(f"Server version updated with {token_name}: {response.status}")
                    print(response.read().decode("utf-8", errors="replace"))
                    break
            except urllib.error.HTTPError as error:
                error_body = error.read().decode("utf-8", errors="replace")
                last_error = f"{token_name} failed: HTTP {error.code} {error_body}"
                print(last_error)
            except Exception as error:
                last_error = f"{token_name} failed: {error}"
                print(last_error)
        else:
            raise SystemExit(last_error or "No usable update token configured")
